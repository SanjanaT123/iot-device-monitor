<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IoT Device Health Monitoring</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>

<!-- HEADER -->

<header class="header">

<div class="header-title">
IoT Device Health Monitoring System
</div>

</header>



<!-- MAIN CONTENT -->

<main class="container">


<!-- ROOM 1 -->

<section class="room-section">

<h2 class="room-title">Room 1</h2>

<div class="device-grid">


<div class="device-card"
onclick="openDashboard('ESP32_01','esp32.png')">

<img src="images/esp32.png" alt="ESP32">

<div class="device-name">
ESP32
</div>

</div>



<div class="device-card"
onclick="openDashboard('ESP32C3_001','esp32c3.png')">

<img src="images/esp32c3.png" alt="ESP32-C3">

<div class="device-name">
ESP32-C3
</div>

</div>


<div class="device-card"
onclick="openDashboard('NANOBEL_01','nanoble.jpg')">

<img src="images/nanoble.png" alt="Nanobel">

<div class="device-name">
Nanobel ESP32
</div>

</div>



<div class="device-card"
onclick="openDashboard('PICO_01','pico.png')">

<img src="images/pico.png" alt="Pico">

<div class="device-name">
Raspberry Pico
</div>

</div>


</div>

</section>



<!-- ROOM 2 -->

<section class="room-section">

<h2 class="room-title">Room 2</h2>

<div class="device-grid">






<div class="device-card"
onclick="openDashboard('ESP32_02','esp32.png')">

<img src="images/esp32.png" alt="ESP32 Node">

<div class="device-name">
ESP32 Node 2
</div>

</div>


</div>

</section>



<!-- ROOM 3 (empty / future devices) -->

<section class="room-section">

<h2 class="room-title">Room 3</h2>

<div class="empty-room">

No devices added yet

</div>

</section>



</main>



<!-- FOOTER -->

<footer class="footer">

Student IoT Monitoring Project • Device Health Dashboard

</footer>



<script src="js/index.js"></script>


</body>

</html>
